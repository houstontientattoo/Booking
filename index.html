 </div>
 <div>
 <label class="block text-[13px] uppercase font-semibold text-zinc-300 mb-1">Estimated Size *</label>
 <input type="text" name="Estimated_Size" placeholder="e.g., 4x6&quot;, 10cm..." required maxlength="50" class="w-full bg-zinc-600 border border-zinc-800 rounded px-4 py-2.5 text-zinc-200 focus:outline-none focus:border-amber-500 transition">
 </div>
 <div>
 <label class="block text-[13px] uppercase font-semibold text-zinc-300 mb-1">Ink Style *</label>
 <select name="Ink_Style" required class="w-full bg-zinc-600 border border-zinc-800 rounded px-4 py-2.5 text-zinc-200 focus:outline-none focus:border-amber-500 transition">
 <option value="">-- Choose Style --</option>
 <option value="Black & Grey">Black & Grey</option>
 <option value="Color">Color Ink</option>
 </select>
 </div>
 </div>
 
<div>
 <label class="block text-[13px] uppercase font-semibold text-zinc-300 mb-1">Describe Your Idea *</label>
 <textarea name="Idea_Description" rows="4" placeholder="Tell us about the story behind it, specific layout choices, and any details you want included..." required maxlength="2000" class="w-full bg-zinc-950 border border-zinc-800 rounded px-4 py-2.5 text-zinc-200 focus:outline-none focus:border-amber-500 transition resize-none"></textarea>
 </div>
 </div>

 <option value="">-- Select Option --</option>
 <option value="Yes">Yes, I am 18 or older</option>
 <option value="No">No, I am under 18</option>
 </select>
 </div>
 <div>
 <label class="block text-[13px] uppercase font-semibold text-zinc-300 mb-1">Do you have any allergies? *</label>
 <input type="text" name="Allergies" placeholder="e.g., Latex, ink, soaps, or 'None'" required maxlength="200" class="w-full bg-zinc-600 border border-zinc-800 rounded px-4 py-2.5 text-zinc-200 focus:outline-none focus:border-amber-500 transition">

 <script>
 // Set minimum booking date to today dynamically
 const today = new Date().toISOString().split('T')[0];
 document.getElementById('bookingDate').setAttribute('min', today);

 // Fix for mobile keyboard blocking inputs
 // This explicitly scrolls the active input into the center of the screen
 const formElements = document.querySelectorAll('input:not([type="radio"]), select, textarea');
 formElements.forEach(el => {
     el.addEventListener('focus', function() {
         // Slight delay gives the virtual keyboard time to fully animate onto the screen
         setTimeout(() => {
             this.scrollIntoView({ behavior: 'smooth', block: 'center' });
         }, 300); 
     });
 });
 </script>
